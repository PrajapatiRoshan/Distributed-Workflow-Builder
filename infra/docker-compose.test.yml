version: '3.9'

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wfbtest
      POSTGRES_PASSWORD: wfbtestpw
      POSTGRES_DB: wfb_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wfbtest']
      interval: 5s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  integration-tests:
    build:
      context: ..
      dockerfile: infra/Dockerfile.test
    environment:
      DATABASE_URL: postgresql://wfbtest:wfbtestpw@postgres-test:5432/wfb_test
      REDIS_URL: redis://redis-test:6379
      NODE_ENV: test
      JWT_SECRET: test-secret-key
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: npm run test:integration
